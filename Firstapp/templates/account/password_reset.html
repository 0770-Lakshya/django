{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <!-- Connects to your central dashboard stylesheet -->
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>

    <div class="login-wrapper" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="login-card" style="background: #ffffff; padding: 40px; border-radius: 24px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 440px; width: 100%;">
            
            <div style="text-align: center; margin-bottom: 24px;">
                <div class="lock-icon" style="font-size: 2.5rem; margin-bottom: 8px; text-align: center;">🔑</div>
                <h2 style="font-size: 1.5rem; color: #111827; font-weight: 700; margin-bottom: 4px;">Password Reset</h2>
                <p style="color: #6b7280; font-size: 0.9rem; line-height: 1.4;">Forgotten your password? Enter your email address below, and we'll send you an email to reset it.</p>
            </div>

            <!-- Password Reset Form -->
            <form method="POST" action="{% url 'account_reset_password' %}" class="password_reset">
                {% csrf_token %}
                
                <div style="margin-bottom: 20px;">
                    <label for="id_email" style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px;">Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email address" autocomplete="email" required id="id_email" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.95rem; outline: none; background: #f9fafb;">
                </div>

                <button class="btn-logout" type="submit" style="width: 100%; background: #2b6cb0; color: white; border: none; padding: 14px; font-weight: 600; border-radius: 12px; cursor: pointer; text-align: center; margin-bottom: 12px;">
                    Reset My Password
                </button>
                
                <a href="{% url 'account_login' %}" style="display: block; padding: 14px; background: #f3f4f6; color: #4b5563; font-weight: 600; font-size: 0.95rem; text-decoration: none; border-radius: 12px; border: 1px solid #e5e7eb; text-align: center;">
                    Back to Sign In
                </a>
            </form>

            <p style="text-align: center; color: #9ca3af; font-size: 0.8rem; margin-top: 24px; line-height: 1.4;">
                Please contact support if you face any issues recovering your account workspace settings.
            </p>

        </div>
    </div>

</body>
</html>
