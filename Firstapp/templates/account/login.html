{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!-- Connects to your central dashboard stylesheet -->
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>

    <div class="login-wrapper" style="min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="login-card" style="background: #ffffff; padding: 40px; border-radius: 24px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 420px; width: 100%;">
            
            <div style="text-align: center; margin-bottom: 24px;">
                <div class="lock-icon" style="font-size: 2.5rem; margin-bottom: 8px; text-align: center;">🔒</div>
                <h2 style="font-size: 1.5rem; color: #111827; font-weight: 700; margin-bottom: 4px;">Welcome Back</h2>
                <p style="color: #6b7280; font-size: 0.9rem;">Sign in to manage your active poll selections</p>
            </div>

            <!-- Standard Local Credential Form -->
            <form class="login" method="POST" action="{% url 'account_login' %}">
                {% csrf_token %}
                
                <div style="margin-bottom: 16px;">
                    <label for="id_login" style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px;">Username or Email</label>
                    <input type="text" name="login" placeholder="Enter your username" autocomplete="username" required id="id_login" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.95rem; outline: none; background: #f9fafb;">
                </div>
                
                <div style="margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <label for="id_password" style="font-size: 0.85rem; font-weight: 600; color: #374151;">Password</label>
                        <a href="{% url 'account_reset_password' %}" style="font-size: 0.8rem; color: #2b6cb0; text-decoration: none; font-weight: 500;">Forgot?</a>
                    </div>
                    <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required id="id_password" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.95rem; outline: none; background: #f9fafb;">
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                    <input type="checkbox" name="remember" id="id_remember" style="accent-color: #3b82f6; transform: scale(1.1);">
                    <label for="id_remember" style="font-size: 0.85rem; color: #4b5563; user-select: none;">Remember me</label>
                </div>

                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                {% endif %}

                <button class="primaryAction btn-logout" type="submit" style="width: 100%; background: #2b6cb0; color: white; border: none; padding: 14px; font-weight: 600; border-radius: 12px; cursor: pointer; text-align: center; margin-bottom: 20px;">
                    Sign In
                </button>
            </form>

            <!-- Third-Party Divider -->
            <div style="display: flex; align-items: center; text-align: center; margin-bottom: 20px;">
                <div style="flex: 1; border-bottom: 1px solid #e5e7eb;"></div>
                <span style="padding: 0 10px; color: #9ca3af; font-size: 0.8rem; font-weight: 500; text-transform: uppercase;">Or connect via</span>
                <div style="flex: 1; border-bottom: 1px solid #e5e7eb;"></div>
            </div>

            <!-- Integrated Google Authorization Button -->
            <a href="{% provider_login_url 'google' %}" class="google-auth-btn" style="display: inline-flex; align-items: center; justify-content: center; width: 100%; background: #ffffff; color: #374151; font-weight: 600; padding: 14px; border: 1px solid #d1d5db; border-radius: 12px; text-decoration: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <svg style="width: 18px; height: 18px; margin-right: 10px;" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.54 15.01 1 12 1 7.28 1 3.26 3.73 1.34 7.71l3.87 3a7.16 7.16 0 0 1 6.79-5.67z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.44h6.44a5.5 5.5 0 0 1-2.39 3.61v3h3.85c2.26-2.08 3.59-5.14 3.59-8.71z"/>
                    <path fill="#FBBC05" d="M5.21 14.71a7.1 7.1 0 0 1 0-4.42l-3.87-3A11.94 11.94 0 0 0 1 12c0 1.77.39 3.46 1.09 4.98l4.12-3.27z"/>
                    <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.85-3c-1.1.74-2.5 1.18-4.11 1.18-3.15 0-5.81-2.13-6.76-5.01l-4.12 3.2A11.96 11.96 0 0 0 12 23z"/>
                </svg>
                Continue with Google
            </a>

            <p style="text-align: center; color: #6b7280; font-size: 0.85rem; margin-top: 24px;">
                Don't have an account? <a href="{% url 'account_signup' %}" style="color: #2b6cb0; text-decoration: none; font-weight: 600;">Sign up</a>
            </p>

        </div>
    </div>

</body>
</html>
