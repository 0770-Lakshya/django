{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out</title>
    <!-- Links directly to your beautiful central style architecture -->
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>

    <div class="login-wrapper" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
        <div class="login-card" style="background: #ffffff; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 100%;">
            <div class="lock-icon" style="font-size: 3rem; margin-bottom: 16px;">👋</div>
            <h2 style="font-size: 1.5rem; margin-bottom: 8px; color: #111827;">Sign Out</h2>
            <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 32px;">Are you sure you want to log out of your polls application workspace session?</p>
            
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                {% endif %}
                
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- The main red sign-out action button -->
                    <button type="submit" class="btn-logout" style="width: 100%; border: none; padding: 14px; font-weight: 600; font-size: 0.95rem; border-radius: 12px; cursor: pointer; text-align: center;">
                        Confirm Sign Out
                    </button>
                    
                    <!-- Cancel option to return to the active layout -->
                    <a href="{% url 'polls:index' %}" style="display: block; padding: 14px; background: #f3f4f6; color: #4b5563; font-weight: 600; font-size: 0.95rem; text-decoration: none; border-radius: 12px; border: 1px solid #e5e7eb;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
